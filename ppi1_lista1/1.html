<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    /*
    * Obejtivo Final / gerado com IA para comparação de funcionalidade
    */
    <title>Cadastro de Pessoas</title>
    <style>

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0; top: 0;
            width: 100%; height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: #000; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 6px; margin-top: 4px; }
        button { margin-top: 15px; width: 100%; }
    </style>
</head>
<body>
    <button id="openModalBtn">Cadastrar Pessoa</button>

    <div id="cadastroModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModalBtn">&times;</span>
            <h2>Cadastro de Pessoa</h2>
            <form id="cadastroForm" enctype="multipart/form-data">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>

                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>

                <label for="genero">Gênero:</label>
                <select id="genero" name="genero" required>
                    <option value="">Selecione</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="outro">Outro</option>
                </select>

                <label for="arquivo">Arquivo:</label>
                <input type="file" id="arquivo" name="arquivo" required>

                <button type="submit">Cadastrar</button>
            </form>
            <div id="mensagem"></div>
        </div>
    </div>

    <script>

        const modal = document.getElementById('cadastroModal');
        document.getElementById('openModalBtn').onclick = () => modal.style.display = 'block';
        document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
        window.onclick = (event) => { if (event.target == modal) modal.style.display = 'none'; };

        document.getElementById('cadastroForm').onsubmit = async function(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);

            try {
                const response = await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    document.getElementById('mensagem').textContent = 'Cadastro realizado com sucesso!';
                    form.reset();
                } else {
                    document.getElementById('mensagem').textContent = 'Erro ao cadastrar.';
                }
            } catch (error) {
                document.getElementById('mensagem').textContent = 'Erro de conexão.';
            }
        };
    </script>
</body>
</html>
